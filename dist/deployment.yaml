apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-app
  labels:
    app: trend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trend
  template:
    metadata:
      labels:
        app: trend
    spec:
      containers:
      - name: trend-app
        image: mohamed7431/trend-app:latest  # ✅ Correct Docker Hub image
        ports:
        - containerPort: 80
